<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG ArXiv Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 2rem; max-width: 900px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 0.3rem; color: #fff; }
        .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        input[type="text"] { flex: 1; padding: 0.8rem 1rem; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #fff; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: #4a9eff; }
        button { padding: 0.8rem 1.5rem; border: none; border-radius: 8px; background: #4a9eff; color: #fff; font-size: 1rem; cursor: pointer; }
        button:hover { background: #3a8eef; }
        button:disabled { background: #333; cursor: not-allowed; }
        .filters { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filters input { padding: 0.5rem 0.8rem; border: 1px solid #333; border-radius: 6px; background: #1a1a1a; color: #fff; font-size: 0.85rem; width: 180px; }
        .filters label { color: #888; font-size: 0.8rem; display: flex; flex-direction: column; gap: 0.2rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .tab { padding: 0.5rem 1rem; border-radius: 6px; background: #1a1a1a; border: 1px solid #333; color: #888; cursor: pointer; font-size: 0.9rem; }
        .tab.active { background: #4a9eff; border-color: #4a9eff; color: #fff; }
        .answer-box { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; line-height: 1.7; }
        .answer-box p { margin-bottom: 0.5rem; }
        .meta { display: flex; gap: 1rem; color: #666; font-size: 0.8rem; margin-top: 0.8rem; }
        .results { display: flex; flex-direction: column; gap: 1rem; }
        .chunk { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 1.2rem; }
        .chunk-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .chunk-ref { background: #4a9eff; color: #fff; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .chunk-title { font-size: 0.85rem; color: #aaa; flex: 1; margin-left: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chunk-similarity { color: #4a9eff; font-size: 0.85rem; font-weight: bold; }
        .chunk-section { color: #888; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .chunk-content { font-size: 0.9rem; line-height: 1.6; color: #ccc; }
        .chunk-footer { display: flex; justify-content: space-between; margin-top: 0.8rem; font-size: 0.75rem; color: #666; }
        .chunk-footer a { color: #4a9eff; text-decoration: none; }
        .spinner { display: none; text-align: center; padding: 2rem; color: #888; }
        .empty { text-align: center; padding: 3rem; color: #555; }
    </style>
</head>
<body>
    <h1>📚 RAG ArXiv Search</h1>
    <p class="subtitle">Semantic search over research papers with cited answers · IVFFlat ANN · pgvector</p>

    <div class="search-box">
        <input type="text" id="query" placeholder="Ask a question about the papers..." />
        <button id="searchBtn" onclick="run()">Search</button>
    </div>

    <div class="filters">
        <label>Author <input type="text" id="author" placeholder="e.g. Jakub Prejzner" /></label>
        <label>After <input type="text" id="after" placeholder="YYYY-MM-DD" /></label>
        <label>Before <input type="text" id="before" placeholder="YYYY-MM-DD" /></label>
    </div>

    <div class="tabs">
        <div class="tab active" id="tabAsk" onclick="setMode('ask')">Ask (with citations)</div>
        <div class="tab" id="tabSearch" onclick="setMode('search')">Search (chunks only)</div>
    </div>

    <div id="spinner" class="spinner">Thinking...</div>
    <div id="answerBox" class="answer-box" style="display:none;"></div>
    <div id="results" class="results"></div>
    <div id="empty" class="empty">Ask a question to search across your papers.</div>

    <script>
        let mode = 'ask';

        function setMode(m) {
            mode = m;
            document.getElementById('tabAsk').classList.toggle('active', m === 'ask');
            document.getElementById('tabSearch').classList.toggle('active', m === 'search');
        }

        document.getElementById('query').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') run();
        });

        async function run() {
            const q = document.getElementById('query').value.trim();
            if (!q) return;

            const author = document.getElementById('author').value.trim();
            const after = document.getElementById('after').value.trim();
            const before = document.getElementById('before').value.trim();

            const params = new URLSearchParams({ q });
            if (author) params.set('author', author);
            if (after) params.set('after', after);
            if (before) params.set('before', before);

            document.getElementById('spinner').style.display = 'block';
            document.getElementById('results').innerHTML = '';
            document.getElementById('answerBox').style.display = 'none';
            document.getElementById('empty').style.display = 'none';
            document.getElementById('searchBtn').disabled = true;

            try {
                const endpoint = mode === 'ask' ? '/ask' : '/search';
                const res = await fetch(`${endpoint}?${params}`);
                const data = await res.json();

                if (data.detail) {
                    document.getElementById('results').innerHTML = `<div class="empty">Error: ${data.detail}</div>`;
                    return;
                }

                // Show answer if /ask mode
                if (mode === 'ask' && data.answer) {
                    const answerBox = document.getElementById('answerBox');
                    answerBox.innerHTML = `
                        <p>${data.answer.replace(/\n/g, '<br>')}</p>
                        <div class="meta">
                            <span>Model: ${data.model}</span>
                            <span>Tokens: ${data.tokens_used}</span>
                        </div>
                    `;
                    answerBox.style.display = 'block';
                }

                // Show chunks/references
                const chunks = data.results || data.references || [];
                const container = document.getElementById('results');

                if (chunks.length === 0) {
                    container.innerHTML = '<div class="empty">No results found.</div>';
                    return;
                }

                container.innerHTML = chunks.map((c, i) => {
                    const ref = c.ref || `[${i + 1}]`;
                    const similarity = c.similarity ? `${(c.similarity * 100).toFixed(1)}%` : '';
                    const arxivUrl = `https://arxiv.org/abs/${c.arxiv_id}`;
                    const title = c.title || '';
                    const section = c.section || '';
                    const content = c.content || '';
                    const authors = c.authors ? c.authors.join(', ') : '';
                    const published = c.published || '';

                    return `
                        <div class="chunk">
                            <div class="chunk-header">
                                <span class="chunk-ref">${ref}</span>
                                <span class="chunk-title">${title}</span>
                                <span class="chunk-similarity">${similarity}</span>
                            </div>
                            <div class="chunk-section">§ ${section}</div>
                            ${content ? `<div class="chunk-content">${content}</div>` : ''}
                            <div class="chunk-footer">
                                <span>${authors}${published ? ' · ' + published : ''}</span>
                                <a href="${arxivUrl}" target="_blank">${c.arxiv_id} ↗</a>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                document.getElementById('results').innerHTML = `<div class="empty">Error: ${err.message}</div>`;
            } finally {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('searchBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
